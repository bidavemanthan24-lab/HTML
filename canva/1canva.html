<!DOCTYPE html> 
<html> 
<head> 
<title>Canvas vs SVG</title> 
</head> 
<body> 
<h2>Canvas</h2> 
<canvas id="canvas" width="300" height="150" style="border:1px solid black;">
</canvas> 
<script> 
let ctx = document.getElementById("canvas").getContext("2d"); 
ctx.fillStyle = "red"; 
ctx.beginPath(); 
ctx.arc(150, 75, 50, 0, 2 * Math.PI); 
ctx.fill(); 
</script>  

</body> 
</html>
